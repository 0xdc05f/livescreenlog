spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/livescreenlog?reWriteBatchedInserts=true
    username: livescreenlog_user
    password: livescreenlog_password
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

livescreenlog:
  security:
    dashboard-enabled: ${LIVESCREENLOG_DASHBOARD_ENABLED:false}
