spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:livescreenlog}?reWriteBatchedInserts=true
    username: ${DB_USER:livescreenlog_user}
    password: ${DB_PASSWORD:livescreenlog_password}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

livescreenlog:
  security:
    dashboard-enabled: ${LIVESCREENLOG_DASHBOARD_ENABLED:false}
